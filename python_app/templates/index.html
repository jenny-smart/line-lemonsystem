<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LINE Bot 訊息管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f6f7f9;color:#17202a}.sidebar{position:fixed;inset:0 auto 0 0;width:240px;background:#20252d;color:#fff;padding:20px}.sidebar a{display:block;color:#d7dde8;text-decoration:none;padding:10px 12px;border-radius:8px;margin-bottom:4px}.sidebar a.active,.sidebar a:hover{background:#303844;color:#fff}.brand{font-weight:800;font-size:20px;margin:4px 0 24px}.main{margin-left:240px;padding:24px}.card{border:0;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.06)}.stat{font-size:30px;font-weight:800}.tag{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;color:#fff;margin:1px}.status{border:0;border-radius:999px;color:#fff;padding:4px 9px;font-size:12px}.page{display:none}.page.active{display:block}.table td{vertical-align:middle}.content-cell{max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">LINE Bot 管理</div>
    <a href="#" class="nav-link active" data-page="dashboard">儀表板</a>
    <a href="#" class="nav-link" data-page="messages">訊息管理</a>
    <a href="#" class="nav-link" data-page="users">用戶管理</a>
    <a href="#" class="nav-link" data-page="tags">標籤管理</a>
    <a href="#" class="nav-link" data-page="keywords">關鍵字回覆</a>
    <a href="#" class="nav-link" data-page="broadcast">群發訊息</a>
  </aside>

  <main class="main">
    <section id="dashboard" class="page active">
      <h2 class="mb-3">儀表板</h2>
      <div class="row g-3" id="stats"></div>
    </section>

    <section id="messages" class="page">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>訊息管理</h2>
        <button class="btn btn-primary" onclick="loadMessages()">重新載入</button>
      </div>
      <div class="card mb-3"><div class="card-body">
        <div class="row g-2">
          <div class="col-md-2"><select id="messageStatus" class="form-select"><option value="">全部狀態</option></select></div>
          <div class="col-md-2"><input id="messageStart" type="date" class="form-control"></div>
          <div class="col-md-2"><input id="messageEnd" type="date" class="form-control"></div>
          <div class="col-md-2"><input id="messageKeyword" class="form-control" placeholder="關鍵字"></div>
          <div class="col-md-2"><input id="messageUserId" class="form-control" placeholder="用戶 ID"></div>
          <div class="col-md-2"><input id="messageTag" class="form-control" placeholder="標籤"></div>
        </div>
      </div></div>
      <div class="card"><div class="card-body table-responsive">
        <table class="table table-hover">
          <thead><tr><th>時間</th><th>用戶</th><th>標籤</th><th>內容</th><th>狀態</th><th>操作</th></tr></thead>
          <tbody id="messageRows"></tbody>
        </table>
      </div></div>
    </section>

    <section id="users" class="page">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>用戶管理</h2>
        <button class="btn btn-primary" onclick="loadUsers()">重新載入</button>
      </div>
      <div class="card mb-3"><div class="card-body">
        <div class="row g-2">
          <div class="col-md-6"><input id="userKeyword" class="form-control" placeholder="搜尋名稱或 ID"></div>
          <div class="col-md-4"><input id="userTag" class="form-control" placeholder="標籤"></div>
          <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadUsers()">搜尋</button></div>
        </div>
      </div></div>
      <div class="card"><div class="card-body table-responsive">
        <table class="table table-hover">
          <thead><tr><th>用戶</th><th>自訂名稱</th><th>標籤</th><th>互動</th><th>最後互動</th><th>操作</th></tr></thead>
          <tbody id="userRows"></tbody>
        </table>
      </div></div>
    </section>

    <section id="tags" class="page">
      <h2 class="mb-3">標籤管理</h2>
      <div class="card mb-3"><div class="card-body row g-2">
        <div class="col-md-3"><input id="tagName" class="form-control" placeholder="標籤名稱"></div>
        <div class="col-md-2"><input id="tagColor" type="color" class="form-control form-control-color" value="#06C755"></div>
        <div class="col-md-5"><input id="tagDescription" class="form-control" placeholder="描述"></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" onclick="saveTag()">儲存</button></div>
      </div></div>
      <div id="tagList" class="row g-3"></div>
    </section>

    <section id="keywords" class="page">
      <h2 class="mb-3">關鍵字回覆</h2>
      <div class="card mb-3"><div class="card-body row g-2">
        <input id="keywordId" type="hidden">
        <div class="col-md-2"><input id="keywordText" class="form-control" placeholder="關鍵字"></div>
        <div class="col-md-2"><select id="keywordMatch" class="form-select"><option value="contains">包含</option><option value="exact">完全符合</option></select></div>
        <div class="col-md-6"><input id="keywordReply" class="form-control" placeholder="回覆內容"></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" onclick="saveKeyword()">儲存</button></div>
      </div></div>
      <div class="card"><div class="card-body table-responsive">
        <table class="table"><thead><tr><th>關鍵字</th><th>比對</th><th>回覆</th><th>啟用</th><th>操作</th></tr></thead><tbody id="keywordRows"></tbody></table>
      </div></div>
    </section>

    <section id="broadcast" class="page">
      <h2 class="mb-3">群發訊息</h2>
      <div class="card"><div class="card-body">
        <textarea id="broadcastMessage" class="form-control mb-3" rows="5" placeholder="輸入要推播給所有用戶的訊息"></textarea>
        <button class="btn btn-primary" onclick="sendBroadcast()">送出群發</button>
        <div id="broadcastResult" class="mt-3"></div>
      </div></div>
    </section>
  </main>

  <script>
    const statusOptions = {{ status_options | tojson }};
    const statusMap = Object.fromEntries(statusOptions.map(s => [s.id, s]));
    const api = (url, options={}) => fetch(url, {headers:{'Content-Type':'application/json'}, ...options}).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
    const esc = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
    const tagHtml = tags => String(tags || '').split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="tag" style="background:#06C755">${esc(t)}</span>`).join('') || '<span class="text-muted">無</span>';
    const statusBadge = id => {
      const s = statusMap[id] || {name:id || '未回覆', color:'#6c757d'};
      return `<span class="status" style="background:${s.color}">${esc(s.name)}</span>`;
    };

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        link.classList.add('active');
        document.getElementById(link.dataset.page).classList.add('active');
        loadPage(link.dataset.page);
      });
    });

    function populateStatusOptions() {
      const el = document.getElementById('messageStatus');
      statusOptions.forEach(s => el.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`));
    }

    async function loadStats() {
      const stats = await api('/api/stats');
      document.getElementById('stats').innerHTML = [
        ['總訊息', stats.totalMessages],
        ['活躍用戶', stats.activeUsers],
        ['今日訊息', stats.todayMessages],
        ['回覆率', `${stats.responseRate}%`],
      ].map(([label, value]) => `<div class="col-md-3"><div class="card"><div class="card-body"><div class="stat">${value}</div><div class="text-muted">${label}</div></div></div></div>`).join('');
    }

    async function loadMessages() {
      const params = new URLSearchParams({
        status: document.getElementById('messageStatus').value,
        keyword: document.getElementById('messageKeyword').value,
        user_id: document.getElementById('messageUserId').value,
        tag: document.getElementById('messageTag').value,
        start_date: document.getElementById('messageStart').value,
        end_date: document.getElementById('messageEnd').value,
      });
      const result = await api(`/api/messages?${params}`);
      document.getElementById('messageRows').innerHTML = result.items.map(m => `
        <tr>
          <td>${esc(m.created_at)}</td>
          <td>${esc(m.edited_name || m.display_name || m.line_user_id)}</td>
          <td>${tagHtml(m.tags)}</td>
          <td class="content-cell" title="${esc(m.content)}">${esc(m.content)}</td>
          <td>${statusBadge(m.status)}</td>
          <td>
            <select class="form-select form-select-sm" onchange="updateMessageStatus(${m.id}, this.value)">
              ${statusOptions.map(s => `<option value="${s.id}" ${s.id === m.status ? 'selected' : ''}>${s.name}</option>`).join('')}
            </select>
          </td>
        </tr>`).join('') || '<tr><td colspan="6" class="text-center text-muted">沒有訊息</td></tr>';
    }

    async function updateMessageStatus(id, status) {
      await api(`/api/messages/${id}/status`, {method:'PATCH', body:JSON.stringify({status})});
      await loadMessages();
      await loadStats();
    }

    async function loadUsers() {
      const params = new URLSearchParams({keyword: document.getElementById('userKeyword').value, tag: document.getElementById('userTag').value});
      const result = await api(`/api/users?${params}`);
      document.getElementById('userRows').innerHTML = result.items.map(u => `
        <tr>
          <td>${esc(u.display_name || u.line_user_id)}<div class="small text-muted">${esc(u.line_user_id)}</div></td>
          <td>${esc(u.edited_name || '')}</td>
          <td>${tagHtml(u.tags)}</td>
          <td>${u.interaction_count}</td>
          <td>${esc(u.last_interaction || '')}</td>
          <td><button class="btn btn-sm btn-outline-primary" onclick="editUser('${esc(u.line_user_id)}','${esc(u.edited_name || '')}','${esc(u.tags || '')}')">編輯</button></td>
        </tr>`).join('') || '<tr><td colspan="6" class="text-center text-muted">沒有用戶</td></tr>';
    }

    async function editUser(userId, name, tags) {
      const editedName = prompt('自訂名稱', name);
      if (editedName === null) return;
      const nextTags = prompt('標籤，用逗號分隔', tags);
      if (nextTags === null) return;
      await api(`/api/users/${encodeURIComponent(userId)}`, {method:'PATCH', body:JSON.stringify({editedName, tags: nextTags})});
      await loadUsers();
    }

    async function loadTags() {
      const tags = await api('/api/tags');
      document.getElementById('tagList').innerHTML = tags.map(t => `
        <div class="col-md-4"><div class="card"><div class="card-body">
          <span class="tag" style="background:${esc(t.color)}">${esc(t.name)}</span>
          <p class="text-muted mt-2 mb-2">${esc(t.description || '')}</p>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteTag(${t.id})">刪除</button>
        </div></div></div>`).join('') || '<div class="text-muted">尚未建立標籤</div>';
    }

    async function saveTag() {
      await api('/api/tags', {method:'POST', body:JSON.stringify({
        name: document.getElementById('tagName').value,
        color: document.getElementById('tagColor').value,
        description: document.getElementById('tagDescription').value,
      })});
      document.getElementById('tagName').value = '';
      document.getElementById('tagDescription').value = '';
      await loadTags();
    }

    async function deleteTag(id) {
      if (!confirm('確定刪除標籤？')) return;
      await api(`/api/tags/${id}`, {method:'DELETE'});
      await loadTags();
    }

    async function loadKeywords() {
      const rows = await api('/api/keyword-replies');
      document.getElementById('keywordRows').innerHTML = rows.map(r => `
        <tr>
          <td>${esc(r.keyword)}</td><td>${r.match_type === 'exact' ? '完全符合' : '包含'}</td>
          <td>${esc(r.reply_text)}</td><td>${r.enabled ? '是' : '否'}</td>
          <td><button class="btn btn-sm btn-outline-danger" onclick="deleteKeyword(${r.id})">刪除</button></td>
        </tr>`).join('') || '<tr><td colspan="5" class="text-center text-muted">尚未建立關鍵字回覆</td></tr>';
    }

    async function saveKeyword() {
      await api('/api/keyword-replies', {method:'POST', body:JSON.stringify({
        keyword: document.getElementById('keywordText').value,
        replyText: document.getElementById('keywordReply').value,
        matchType: document.getElementById('keywordMatch').value,
        enabled: true,
      })});
      document.getElementById('keywordText').value = '';
      document.getElementById('keywordReply').value = '';
      await loadKeywords();
    }

    async function deleteKeyword(id) {
      if (!confirm('確定刪除關鍵字回覆？')) return;
      await api(`/api/keyword-replies/${id}`, {method:'DELETE'});
      await loadKeywords();
    }

    async function sendBroadcast() {
      const result = await api('/api/broadcast', {method:'POST', body:JSON.stringify({message: document.getElementById('broadcastMessage').value})});
      document.getElementById('broadcastResult').innerHTML = `<div class="alert alert-info">成功 ${result.successCount}，失敗 ${result.failCount}，總共 ${result.totalCount}</div>`;
    }

    function loadPage(page) {
      if (page === 'dashboard') loadStats();
      if (page === 'messages') loadMessages();
      if (page === 'users') loadUsers();
      if (page === 'tags') loadTags();
      if (page === 'keywords') loadKeywords();
    }

    populateStatusOptions();
    loadStats();
  </script>
</body>
</html>
