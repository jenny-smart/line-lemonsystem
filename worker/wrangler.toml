name = "line-lemon-webhook"
main = "src/index.js"
compatibility_date = "2024-09-23"

# 以下變數請用 `wrangler secret put 變數名稱` 個別設定，不要寫在這裡：
# - LINE_CHANNEL_SECRET
# - LINE_CHANNEL_ACCESS_TOKEN
# - TURSO_DATABASE_URL
# - TURSO_AUTH_TOKEN
# - OPENAI_API_KEY
# - REMINDER_API_KEY

[triggers]
crons = ["* * * * *"]

[vars]
# 可改成帳號可用的模型；預設程式使用 gpt-5.6。
OPENAI_MODEL = "gpt-5.6"
AI_AUTO_REPLY = "on"
